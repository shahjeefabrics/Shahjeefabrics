<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shah Jee Fabrics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#050510;color:#e0e0e8;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a1a}::-webkit-scrollbar-thumb{background:rgba(0,245,212,.3);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:#00f5d4}
canvas#ptc{position:fixed;inset:0;z-index:0;pointer-events:none}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,245,212,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,212,.02) 1px,transparent 1px);background-size:50px 50px}
.glow-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite}
.glow-orb.o1{width:400px;height:400px;background:rgba(0,245,212,.06);top:-100px;right:-100px;animation-delay:0s}
.glow-orb.o2{width:350px;height:350px;background:rgba(247,37,133,.05);bottom:-100px;left:-100px;animation-delay:3s}
.glow-orb.o3{width:300px;height:300px;background:rgba(114,9,183,.05);top:50%;left:50%;animation-delay:5s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.1)}50%{transform:translate(-20px,30px) scale(.9)}75%{transform:translate(20px,20px) scale(1.05)}}

/* LOGIN */
#loginOvl{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(5,5,16,.85);backdrop-filter:blur(20px)}
.login-wrap{position:relative;padding:2px;border-radius:24px;overflow:hidden;width:420px;max-width:92vw}
.login-wrap::before{content:'';position:absolute;top:50%;left:50%;width:200%;height:200%;background:conic-gradient(from var(--a),#00f5d4,transparent 30%,#f72585,transparent 60%,#7209b7,transparent 90%,#00f5d4);animation:spin 3s linear infinite}
@keyframes spin{to{--a:360deg}}
.login-card{position:relative;z-index:1;background:rgba(10,10,30,.95);border-radius:22px;padding:40px 36px;backdrop-filter:blur(30px)}
.login-card .logo-c{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#00f5d4,#7209b7);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#000;margin:0 auto 20px;box-shadow:0 0 30px rgba(0,245,212,.3);animation:logoPulse 2s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 30px rgba(0,245,212,.3)}50%{box-shadow:0 0 50px rgba(0,245,212,.5),0 0 80px rgba(114,9,183,.2)}}
.login-card h2{font-family:'Orbitron',monospace;font-size:22px;font-weight:800;text-align:center;background:linear-gradient(90deg,#00f5d4,#f72585,#7209b7);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textShift 4s ease infinite;margin-bottom:6px}
@keyframes textShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.login-card p{text-align:center;font-size:12px;color:#5a5a7a;margin-bottom:28px}
.lfg{margin-bottom:16px}
.lfg label{display:block;font-size:10px;font-weight:600;color:#5a5a7a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.lfg select,.lfg input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(0,245,212,.15);background:rgba(0,245,212,.03);color:#e0e0e8;font-size:14px;font-family:inherit;outline:0;transition:all .3s}
.lfg select:focus,.lfg input:focus{border-color:#00f5d4;box-shadow:0 0 20px rgba(0,245,212,.15)}
.lfg select option{background:#0a0a1a;color:#e0e0e8}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#00f5d4,#00c4a7);color:#000;font-size:15px;font-weight:700;font-family:'Orbitron',monospace;cursor:pointer;letter-spacing:1px;transition:all .3s;position:relative;overflow:hidden;margin-top:8px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,245,212,.4)}
.login-btn:active{transform:translateY(0)}
.login-btn .rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);transform:scale(0);animation:ripple .6s ease-out}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.login-err{color:#f72585;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.login-hint{text-align:center;font-size:10px;color:#3a3a5a;margin-top:20px}

/* APP */
.app{display:none;height:100vh;position:relative;z-index:1}
.app.show{display:flex}
.sb{width:230px;min-width:230px;background:rgba(10,10,30,.6);backdrop-filter:blur(20px);border-right:1px solid rgba(0,245,212,.08);display:flex;flex-direction:column;position:relative;z-index:10}
.sb::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(0,245,212,.3),transparent);animation:scanV 4s ease-in-out infinite}
@keyframes scanV{0%,100%{opacity:.2}50%{opacity:1}}
.sb-h{padding:16px;border-bottom:1px solid rgba(0,245,212,.08);display:flex;align-items:center;gap:10px}
.sb-h .ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00f5d4,#7209b7);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:#000}
.sb-h h1{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;background:linear-gradient(90deg,#00f5d4,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-h p{font-size:8.5px;color:#5a5a7a}
.sb-n{flex:1;padding:8px;overflow-y:auto}
.nt{font-size:8px;font-weight:700;color:#3a3a5a;text-transform:uppercase;letter-spacing:2px;padding:14px 12px 6px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;color:#5a5a7a;font-size:12px;font-weight:500;transition:all .25s;margin-bottom:2px;position:relative}
.ni:hover{color:#e0e0e8;background:rgba(0,245,212,.05)}
.ni.on{color:#00f5d4;background:rgba(0,245,212,.1)}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#00f5d4;border-radius:0 3px 3px 0;box-shadow:0 0 10px #00f5d4}
.ni.on::after{content:'';position:absolute;left:5px;top:50%;transform:translateY(-50%);width:6px;height:6px;background:#00f5d4;border-radius:50%;animation:dotPulse 1.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 6px #00f5d4}50%{opacity:.4;box-shadow:0 0 2px #00f5d4}}
.ni i{width:18px;text-align:center;font-size:12px}
.ni.locked{opacity:.35;cursor:not-allowed}
.ni.locked::after{display:none}
.sb-f{padding:12px;border-top:1px solid rgba(0,245,212,.08);font-size:8px;color:#3a3a5a;text-align:center}
.sb-f .role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-top:4px}
.role-admin{background:rgba(0,245,212,.15);color:#00f5d4}
.role-accountant{background:rgba(247,37,133,.15);color:#f72585}
.role-dataentry{background:rgba(114,9,183,.15);color:#7209b7}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tp{padding:12px 20px;border-bottom:1px solid rgba(0,245,212,.08);display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,16,.6);backdrop-filter:blur(12px);flex-shrink:0;position:relative;overflow:hidden}
.tp::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00f5d4,transparent);animation:scanH 3s ease-in-out infinite}
@keyframes scanH{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.tp h2{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:#e0e0e8}
.tp p{font-size:10px;color:#5a5a7a;margin-top:2px}
.tp .tr{display:flex;gap:6px;align-items:center}
.ct{flex:1;overflow-y:auto;padding:16px 20px;position:relative}
.ct::before{content:'';position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(180deg,rgba(0,245,212,.02) 0%,transparent 30%);pointer-events:none;z-index:0}
.pg{display:none;position:relative;z-index:1}.pg.on{display:block;animation:pgIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes pgIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.mc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:18px;backdrop-filter:blur(10px);transition:all .4s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,212,.05),transparent 50%,rgba(247,37,133,.05));opacity:0;transition:opacity .4s}
.mc:hover{border-color:rgba(0,245,212,.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.mc:hover::before{opacity:1}
.mc .mi{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:10px;position:relative;z-index:1}
.mc .ml{font-size:10px;color:#5a5a7a;font-weight:600;margin-bottom:4px;position:relative;z-index:1}
.mc .mv{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;line-height:1;position:relative;z-index:1}
.mc .ms{font-size:9px;color:#5a5a7a;margin-top:6px;position:relative;z-index:1}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:16px;backdrop-filter:blur(10px)}
.cc h3{font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#e0e0e8}
.cc h3 i{color:#00f5d4;font-size:11px}
.cw{position:relative;height:200px}
.tc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;margin-bottom:16px;backdrop-filter:blur(10px)}
.th{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.th h3{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;color:#e0e0e8}
.th h3 i{color:#00f5d4}
.tf{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fi,.fs{padding:6px 10px;border-radius:8px;border:1px solid rgba(0,245,212,.12);background:rgba(0,245,212,.03);color:#e0e0e8;font-size:11px;font-family:inherit;outline:0;transition:all .3s}
.fi:focus,.fs:focus{border-color:#00f5d4;box-shadow:0 0 15px rgba(0,245,212,.1)}
.fs option{background:#0a0a1a}
.tox{overflow-x:auto}
.dt{width:100%;border-collapse:collapse}
.dt thead th{padding:9px 12px;font-size:9px;font-weight:700;color:#5a5a7a;text-transform:uppercase;letter-spacing:.8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;background:rgba(0,245,212,.02)}
.dt tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:all .2s;cursor:pointer}
.dt tbody tr:hover{background:rgba(0,245,212,.04);box-shadow:inset 3px 0 0 #00f5d4}
.dt tbody tr:last-child{border-bottom:0}
.dt tbody td{padding:8px 12px;font-size:11px;white-space:nowrap}
.amt{font-weight:700;font-variant-numeric:tabular-nums;font-family:'Orbitron',monospace;font-size:10px}
.pos{color:#00f5d4}.neg{color:#f72585}
.bg{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;display:inline-block;letter-spacing:.3px}
.ba{background:rgba(0,245,212,.12);color:#00f5d4}.bgg{background:rgba(0,245,212,.12);color:#00f5d4}
.br{background:rgba(247,37,133,.12);color:#f72585}.bb{background:rgba(114,9,183,.12);color:#7209b7}
.by{background:rgba(254,228,64,.12);color:#fee440}
.tft{padding:8px 16px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#5a5a7a}
.mo{position:fixed;inset:0;background:rgba(5,5,16,.8);backdrop-filter:blur(12px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.sh{display:flex}
.mb{background:rgba(10,10,30,.95);border:1px solid rgba(0,245,212,.15);border-radius:18px;width:100%;max-width:540px;max-height:82vh;overflow-y:auto;animation:mIn .3s cubic-bezier(.16,1,.3,1);box-shadow:0 0 60px rgba(0,245,212,.1)}
@keyframes mIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,30,.98);backdrop-filter:blur(20px);z-index:1;border-radius:18px 18px 0 0}
.mh h3{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#00f5d4}
.mx{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#5a5a7a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s}
.mx:hover{border-color:#f72585;color:#f72585;background:rgba(247,37,133,.1)}
.mm{padding:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fig{display:flex;flex-direction:column;gap:3px}
.fig label{font-size:9px;font-weight:700;color:#5a5a7a;text-transform:uppercase;letter-spacing:.8px}
.fig input,.fig select{padding:10px 12px;border-radius:10px;border:1px solid rgba(0,245,212,.12);background:rgba(0,245,212,.03);color:#e0e0e8;font-size:12px;font-family:inherit;outline:0;transition:all .3s}
.fig input:focus,.fig select:focus{border-color:#00f5d4;box-shadow:0 0 15px rgba(0,245,212,.1)}
.fig input[readonly]{opacity:.4;cursor:default}
.full{grid-column:1/-1}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di label{display:block;font-size:9px;color:#5a5a7a;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.di span{font-size:12px;font-weight:600;color:#e0e0e8}
.le{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.le:last-child{border-bottom:0}
.lt{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.lt.gz{background:rgba(247,37,133,.12);color:#f72585}.lt.rk{background:rgba(0,245,212,.12);color:#00f5d4}.lt.op{background:rgba(114,9,183,.12);color:#7209b7}
.lf{flex:1;min-width:0}.lf h4{font-size:11px;font-weight:600}.lf p{font-size:9.5px;color:#5a5a7a;margin-top:1px}
.la{text-align:right;flex-shrink:0}
.la .dr{font-size:11px;font-weight:700;color:#f72585;font-family:'Orbitron',monospace}
.la .cr{font-size:11px;font-weight:700;color:#00f5d4;font-family:'Orbitron',monospace}
.la .bl{font-size:9px;color:#5a5a7a;margin-top:1px}
.es{text-align:center;padding:40px 16px;color:#5a5a7a}
.es i{font-size:40px;margin-bottom:12px;opacity:.2;color:#00f5d4}
.es h3{font-size:15px;font-weight:600;color:#e0e0e8;margin-bottom:6px}
.tstc{position:fixed;top:14px;right:14px;z-index:300;display:flex;flex-direction:column;gap:6px}
.tst{padding:10px 18px;border-radius:10px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:8px;animation:tIn .3s cubic-bezier(.16,1,.3,1);min-width:240px;border:1px solid rgba(255,255,255,.08);background:rgba(10,10,30,.95);backdrop-filter:blur(20px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.tst.s{border-left:3px solid #00f5d4;color:#00f5d4}.tst.e{border-left:3px solid #f72585;color:#f72585}.tst.i{border-left:3px solid #7209b7;color:#7209b7}
@keyframes tIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
.btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(0,245,212,.15);background:rgba(0,245,212,.05);color:#e0e0e8;font-size:11px;font-weight:500;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:5px;font-family:inherit;position:relative;overflow:hidden}
.btn:hover{border-color:#00f5d4;color:#00f5d4;box-shadow:0 0 20px rgba(0,245,212,.15);transform:translateY(-1px)}
.btn.pr{background:linear-gradient(135deg,#00f5d4,#00c4a7);color:#000;border:none;font-weight:700;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.5px}
.btn.pr:hover{box-shadow:0 4px 25px rgba(0,245,212,.4);transform:translateY(-2px)}
.btn.dn{border-color:rgba(247,37,133,.2);color:#f72585}.btn.dn:hover{border-color:#f72585;background:rgba(247,37,133,.1);box-shadow:0 0 20px rgba(247,37,133,.15)}
.btn.sm{padding:4px 9px;font-size:10px}
.setc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:24px;max-width:560px;margin-bottom:16px;backdrop-filter:blur(10px)}
.setc h3{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#00f5d4;margin-bottom:4px}
.setc .desc{font-size:12px;color:#5a5a7a;margin-bottom:20px}
.pw-row{display:flex;gap:10px;align-items:end;margin-bottom:12px}
.pw-row .fig{flex:1}
.rpt-filters{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.rpt-filters h3{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#00f5d4;margin-bottom:14px}
.rpt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
@media(max-width:768px){.sb{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-230px);transition:transform .3s}.sb.open{transform:translateX(0)}.mn{margin-left:0!important}.mg{grid-template-columns:1fr 1fr;gap:8px}.cg{grid-template-columns:1fr}.fgrid,.dgrid{grid-template-columns:1fr}.rpt-grid{grid-template-columns:1fr}}
@media(max-width:480px){.mg{grid-template-columns:1fr}}
@media print{.sb,.tp,.mx,.btn,.tf,.tstc,.glow-orb,canvas#ptc,.grid-bg{display:none!important}.mn{margin-left:0!important}body{background:#fff;color:#000}.mc,.tc,.cc,.setc,.rpt-filters{border-color:#ddd;background:#fff;backdrop-filter:none}.dt thead th{color:#333;border-color:#ddd}.dt tbody td{color:#000}}
</style>
</head>
<body>
<canvas id="ptc"></canvas>
<div class="grid-bg"></div>
<div class="glow-orb o1"></div>
<div class="glow-orb o2"></div>
<div class="glow-orb o3"></div>

<div id="loginOvl">
<div class="login-wrap"><div class="login-card">
<div class="logo-c">SF</div>
<h2>SHAH JEE FABRICS</h2>
<p>Wholesale Management System</p>

<div class="lfg" id="urlBox" style="display:none"><label>Apps Script URL</label><input type="url" id="lUrl" placeholder="https://script.google.com/macros/s/XXXXX/exec"></div>

<div class="lfg"><label>Role</label><select id="lRole"><option value="admin">Admin</option><option value="accountant">Accountant</option><option value="dataentry">Data Entry Operator</option></select></div>
<div class="lfg"><label>Password</label><input type="password" id="lPass" placeholder="Enter password..." onkeydown="if(event.key==='Enter')doLogin()"></div>
<button class="login-btn" onclick="doLogin(this,event)">ACCESS SYSTEM</button>
<div class="login-err" id="lErr"></div>
<div class="login-hint">Shah Jee Fabrics &copy; 2025 &middot; Secured System</div>
</div></div>
</div>

<div class="app" id="appEl">
<aside class="sb" id="sbEl">
<div class="sb-h"><div class="ic">SF</div><div><h1>SHAH JEE</h1><p>Management System</p></div></div>
<nav class="sb-n" id="sbNav"></nav>
<div class="sb-f">Shah Jee Fabrics v2.0<br><span class="role-badge" id="roleBadge"></span></div>
</aside>
<div class="mn">

/* SOUND */

if(t==='click'){o.type='sine';o.frequency.value=900;g.gain.exponentialRampToValueAtTime(.001,AX.currentTime+.08);o.start();o.stop(AX.currentTime+.08)}

else if(t==='error'){o.type='sawtooth';o.frequency.value=200;o.frequency.linearRampToValueAtTime(100,AX.currentTime+.15);g.gain.value=.04;g.gain.exponentialRampToValueAtTime(.001,AX.currentTime+.2);o.start();o.stop(AX.currentTime+.2)}

/* PARTICLES */
var pts=[],ptc,ptx;
function initPtc(){ptc=document.getElementById('ptc');ptx=ptc.getContext('2d');ptc.width=window.innerWidth;ptc.height=window.innerHeight;pts=[];for(var i=0;i<50;i++)pts.push({x:Math.random()*ptc.width,y:Math.random()*ptc.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.5+.5,a:Math.random()*.4+.1});aPtc()}
function aPtc(){ptx.clearRect(0,0,ptc.width,ptc.height);pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>ptc.width)p.vx*=-1;if(p.y<0||p.y>ptc.height)p.vy*=-1;ptx.beginPath();ptx.arc(p.x,p.y,p.r,0,Math.PI*2);ptx.fillStyle='rgba(0,245,212,'+p.a+')';ptx.fill()});for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ptx.beginPath();ptx.moveTo(pts[i].x,pts[i].y);ptx.lineTo(pts[j].x,pts[j].y);ptx.strokeStyle='rgba(0,245,212,'+(1-d/100)*.1+')';ptx.stroke()}}requestAnimationFrame(aPtc)}
